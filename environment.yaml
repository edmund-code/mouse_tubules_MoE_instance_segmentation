name: semi-moe-instance
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch=2.2.1
  - torchaudio=2.2.1
  - torchvision=0.17.1
  - pytorch-cuda=12.1
  - numpy=1.26.4
  - scipy=1.11.4
  - tqdm=4.65.0
  - pip

  - pip:
      - albumentations==0.5.2
      - einops==0.8.0
      - SimpleITK==2.3.1
      - timm==0.9.16
      - torchio==0.20.2
      - tensorboard>=2.16.0 
      - openslide-python>=1.3.1
      - shapely>=2.0.0
      - scikit-image>=0.22.0
      - scikit-learn>=1.4.0
      - hdbscan>=0.8.33
      - opencv-python>=4.9.0
      - geojson>=3.1.0
      - pandas>=2.2.0
      - matplotlib>=3.8.0